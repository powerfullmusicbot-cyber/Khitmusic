start_2 : "● ဟေး... ကြိုဆိုပါတယ်... 👀✨\n\n❍ ကျွန်တော်က {1} ပါ \n<blockquote expandable>• ကျွန်တော်က စီမံခန့်ခွဲမှု/ဂီတ ဘော့တ်ပါ\n• အချိန်ပြည့်ပွင့်နေပြီး အကောင်းဆုံး အသံအရည်အသွေး ရှိပါတယ်\n• Pyrogram ဗားရှင်းအသစ်ပေါ်မှာ အခြေခံထားပါတယ်\n• စနစ်ကို အကောင်းဆုံးဖြစ်အောင် ပြန်လည်ပြုပြင်ထားပါတယ်\n• ကြော်ငြာမပါ၊ လိုင်းမလေးပါ\n• သီချင်းကောင်းတွေကိုပဲ ခံစားလိုက်ပါ\n👑ထုတ်လုပ်သူ👑ⓀⒽⒾⓉ\n</blockquote>"
start_3 : "❍ ဟေး {0}၊\n❍ ကျွန်တော်က {1} ပါ\n\n❍ {2} မှာ ကျွန်တော့်ကို ထည့်သွင်းပေးတဲ့အတွက် ကျေးဇူးတင်ပါတယ်၊ {3} အနေနဲ့ အခု ဒီချတ်မှာ သီချင်းတွေ ဖွင့်ပေးနိုင်ပါပြီ။"
start_4 : "🎄 <b>❍ Supergroup လိုအပ်သည်</b> 🎄\n\n❍ ကျေးဇူးပြု၍ သင့် Group ကို Supergroup အဖြစ် ပြောင်းလဲပြီး ကျွန်တော့်ကို ပြန်ထည့်ပါ။\n\n<b>❍ Supergroup ဘယ်လိုလုပ်ရမလဲ ?</b>\n- သင့် Group ရဲ့ Chat History ကို Visible (မြင်နိုင်သည်) အဖြစ် တစ်ကြိမ်ပြောင်းလဲလိုက်ပါ။"
start_5 : "<b>❍ ပိတ်ပင်ထားသော ချတ် ↜</b>\n\n❍ ဤချတ်ကို {0} ဒေတာဘေ့စ်တွင် ပိတ်ပင်ထားပါသည်။\nပြန်လည်ဖွင့်ပေးရန် <a href={1}>Sudo User</a> ကို တောင်းဆိုပါ သို့မဟုတ် <a href={2}>Support Chat</a> သို့ သွားပါ။"
