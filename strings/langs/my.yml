clone_help : "<b><u>❍ Clone Bot Command များ :</u></b>\n\n<b><u>❍ အသုံးပြုသူများအတွက် :</u></b>\n\n/clone [Bot_Token] : သင့်ကိုယ်ပိုင်ဘော့တ်ကို Clone လုပ်ရန်။\n/rmbot [Bot_Token] : Clone လုပ်ထားသောဘော့တ်ကို ဖျက်ရန်။\n/mybot : သင် Clone လုပ်ထားသော ဘော့တ်စာရင်းကို ကြည့်ရန်။\n\n<b><u>❍ Sudo Command များ :</u></b>\n\n/cloned : Clone လုပ်ထားသော ဘော့တ်စုစုပေါင်းကို စစ်ရန်။\n/totalbots : ဘော့တ်အားလုံး စုစုပေါင်းကို စစ်ရန်။\n/clonedinfo : Clone ဘော့တ်အားလုံး၏ အချက်အလက်ကို ယူရန်။\n/delallclone : Clone ဘော့တ်အားလုံးကို ဖျက်ရန်။\n/delclone : အသုံးပြုသူတစ်ဦး၏ Clone အားလုံးကို ဖျက်ရန် (Reply)။\n/restartclone : အသုံးပြုသူတစ်ဦး၏ Clone အားလုံးကို ပြန်လည်စတင်ရန် (Reply)။\n/clonebroadcast : Clone ပိုင်ရှင်အားလုံးထံသို့ မက်ဆေ့ဂျ်ပို့ရန်။"



